<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>wpmdle</title>
    <style>
        body {
            font-family: monospace;
            background: #121213;
            color: #d7dadc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
    </style>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
</head>
<body tabindex="0">
    <h1>wpmdle</h1>
    <div id="game">
        <p id="mode-display">mode</p>
        <p id="target-display">target: -- wpm</p>
        <p id="attempt-display">attempt: x / x</p>
        <div id="passage"></div>
    </div>
    <div id="results" hidden>
        <h2>results</h2>
        <p id="wpm-result"></p>
        <p id="emoji-result"></p>
        <button id="next-btn">next attempt</button>
    </div>
    <div class="buttons">
        <button id="share-btn" hidden>share results</button>
        <button id="daily-btn">daily</button>
        <button id="unlimited-btn">unlimited</button> 
        <button id="easy-btn">easy</button>
        <button id="hard-btn">hard</button>
    </div>
    <div id="leaderboard-container">
        <div id="leaderboard"></div>
    </div>

    <script>
        console.log("wired up");
    </script>
</body>
</html>
